name: Build Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Run test suite
        shell: pwsh
        run: python -m pytest

      - name: Build Windows package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Upload packaged folder
        uses: actions/upload-artifact@v6
        with:
          name: DocTranslationTool-win64-folder
          path: dist/DocTranslationTool
          if-no-files-found: error
          retention-days: 14

      - name: Upload packaged zip
        uses: actions/upload-artifact@v6
        with:
          name: DocTranslationTool-win64-zip
          path: dist/DocTranslationTool-v*-win64.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/DocTranslationTool-v*-win64.zip
          generate_release_notes: true
